<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: white;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            box-sizing: border-box;
        }
        @media (max-width: 300px) {
            .menu {
                visibility: hidden;
            }
        }
        .block {
            display: inline-block;
        }
        .blank {
            height: 100px;
        }
        header {
            position: fixed;
            width: 100%;
            box-shadow: 3px 3px 10px rgba(150, 150, 150, 0.51);
            left: 0;
            top: 0;
            z-index: 10;
        }
        .head {
            display: flex;
            justify-content: space-between;
            height: 70px;
            line-height: 30px;
            background-color: white;
        }
        .logo {
            margin: 20px 0 0 5%;
            height: 30px;
            width: 100px;
            text-align: center;
            font-size: 20px;
        }
        .ham {
            cursor: pointer;
            margin: 20px 30px 0 0;
            height: 30px;
            width: 30px;
            background-color: rgb(140, 140, 140);
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background-color: white;
            height: 30px;
            line-height: 20px;
        }
        .menu-item {
            display: block;
            width: 100px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }
        .navbar {
            display: none;
            position: fixed;
            right: 20px;
            top: 60px;
        }
        .navbar.show-menu {
            display: inherit;
            position: fixed;
            right: 20px;
            top: 60px;
        }
        .nav-item {
            display: block;
            width: 100px;
            height: 30px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            line-height: 30px;
            background-color: white;
            border-style: solid;
            border-width: 30px;
            border-color: rgb(173, 173, 173);
        }
        .post-box {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            max-height: 470px;
            overflow-y: auto;
        }
        .post-box-title {
            display: block;
            max-width: 1200px;
            background-color: whitesmoke;
            color: dimgray;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            text-align: left;
            margin: 20px;
            border-radius: 10px;
        }
        .post-item {
            margin-bottom: 20px;
            background-color: white;
            border: 5px solid mistyrose;
            border-radius: 10px;
        }
        .post-item:hover {
            background-color: mistyrose;
        }
        .post-item a {
            display: flex;
            text-decoration: none;
            padding: 8px;
            align-items: center;
        }
        .post-content {
            display: flex;
            flex-direction: column;
            max-width: 92%;
            align-items: flex-start;
        }
        .title {
            background-color: palegreen;
            color: black;
            font-size: 18px;
            font-weight: bold;
            padding: 5px;
            margin-bottom: 8px;
            word-break: break-all;
            border-radius: 5px;
        }
        .label {
            background-color: lightcyan;
            color: red;
            font-size: 30px;
            font-weight: bold;
            margin-left: auto;
            padding: 5px;
            flex-shrink: 0;
            border-radius: 5px;
        }
        .author {
            background-color: lightgoldenrodyellow;
            color: black;
            font-size: 13px;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
    <script>
        function menu() {
        var x = document.getElementById('navbar');
        x.classList.toggle('show-menu');
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="head">
                <div class="logo block">
                    Gongmoa
                </div>
                <div class="ham block" onclick="menu()">
                </div>
            </div>
            <div class="menu">
                <a href="list.html" class="menu-item">글 목록</a>
                <a href="post.html" class="menu-item">글쓰기</a>
                <a href="mypage.html" class="menu-item">마이페이지</a>
            </div>
            <div class="navbar" id="navbar">
                <a href="list.html" class="nav-item">글 목록</a>
                <a href="post.html" class="nav-item">글쓰기</a>
                <a href="mypage.html" class="nav-item">마이페이지</a>
            </div>
        </header>
        <div class="blank"></div>
        <div class="post-box-title">게시물 목록</div>
        <div class="post-box">
         <div class="post-item" th:each="board : ${boardList}">
            <a href="detail.html" th:href="@{/board/{id}(id=${board.id})}">
                <div class="post-content">
                    <span class="title" th:text="${board.boardTitle}"></span>
                    <span class="author" th:text="${board.boardWriter}"></span>
                </div>
                <span class="label" th:text="${board.dday>0?'D-'+board.dday:board.dday==0?'D-Day':'마감'}"></span>
            </a>
        </div>                 
        </div>
    </div>
</body>
</html>
