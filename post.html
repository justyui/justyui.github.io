<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            box-sizing: border-box;
        }

        @media (max-width: 300px) {
            .menu {
                visibility: hidden;
            }
        }

        .block {
            display: inline-block;
        }

        .blank {
            height: 100px;
        }

        header {
            position: fixed;
            width: 100%;
            box-shadow: 3px 3px 10px rgba(150, 150, 150, 0.51);
            left: 0;
            top: 0;
            z-index: 10;
        }

        .head {
            display: flex;
            justify-content: space-between;
            height: 70px;
            line-height: 30px;
            background-color: white;
        }

        .logo {
            margin: 20px 0 0 5%;
            height: 30px;
            width: 100px;
            text-align: center;
            font-size: 20px;
        }

        .ham {
            cursor: pointer;
            margin: 20px 30px 0 0;
            height: 30px;
            width: 30px;
            background-color: rgb(140, 140, 140);
        }

        .menu {
            display: flex;
            justify-content: space-around;
            background-color: white;
            height: 30px;
            line-height: 20px;
        }

        .menu-item {
            display: block;
            width: 100px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }

        .navbar {
            display: none;
            position: fixed;
            right: 20px;
            top: 60px;
        }

            .navbar.show-menu {
                display: inherit;
                position: fixed;
                right: 20px;
                top: 60px;
            }

        .nav-item {
            display: block;
            width: 100px;
            height: 30px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            line-height: 30px;
            background-color: white;
            border-style: solid;
            border-width: 30px;
            border-color: rgb(173, 173, 173);
        }

        .post-box-title {
            display: block;
            max-width: 1200px;
            background-color: whitesmoke;
            color: dimgray;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            text-align: left;
            margin: 20px;
            border-radius: 10px;
        }

        .post-box {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            height: 500px;
            overflow-y: auto;
        }

        .title {
            padding: 5px 10px;
            background-color: pink;
            display: flex;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
            align-items: center;
            margin: 0px 20px;
        }

            .title input {
                flex-grow: 1;
                height: 20px;
                margin: 0 5px;
            }

        .post {
            border: 8px solid mistyrose;
            margin-bottom: 20px;
            background-color: white;
            margin: 0px 20px;
            display: flex;
            min-height: 650px;
            flex-direction: column;
        }

        .post-top {
            display: flex;
            flex-wrap: wrap;
        }

        .image {
            width: 100%;
            max-width: 550px;
            min-height: 550px;
            background-color: gray;
            display: flex;
            margin: 7px;
        }

            .image input[type="file"] {
                display:none;
            }
            .image label {
                width: 100%;
                height:100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
        .image.has-image .upload{
            display:none;
        }
        .image.has-image img{
            border-block:inherit;
        }
        .text {
            width: 100%;
            max-width: 500px;
            min-height: 350px;
            word-break: break-all;
            margin: 7px;
        }

        textarea {
            width: 100%;
            height: 100%;
        }

        p, #cal {
            align-self: center;
            margin-bottom: 10px;
        }

        .pwd {
            width: 100%;
            max-width: 280px;
            height: 30px;
            background-color: lightgray;
            align-self: center;
            padding: 3px;
            margin-bottom: 10px;
        }

        .submit-btn {
            display: flex;
            justify-content: center;
            margin: 20px;
        }

            .submit-btn input {
                background-color: indianred;
                color: white;
                font-size: 40px;
                font-weight: bold;
                border: none;
                cursor: pointer;
                border-radius: 5px
            }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css" />
    <script>
        function menu() {
        var x = document.getElementById('navbar');
        x.classList.toggle('show-menu');
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="head">
                <div class="logo block">
                    Gongmoa
                </div>
                <div class="ham block" onclick="menu()">
                </div>
            </div>
            <div class="menu">
                <a href="list.html" class="menu-item">글 목록</a>
                <a href="post.html" class="menu-item">글쓰기</a>
                <a href="mypage.html" class="menu-item">마이페이지</a>
            </div>
            <div class="navbar" id="navbar">
                <a href="list.html" class="nav-item">글 목록</a>
                <a href="post.html" class="nav-item">글쓰기</a>
                <a href="mypage.html" class="nav-item">마이페이지</a>
            </div>
        </header>
        <div class="blank"></div>
        <div class="post-box-title">글쓰기</div>
        <div class="post-box">
            <form action="" method="POST">
                <div class="title">
                    <label for="title">게시글 제목</label>
                    <input type="text" name="title" placeholder="제목을 입력하세요" />
                </div>
                <div class="post">
                    <div class="post-top">
                        <div class="image">
                            <label for="image">
                                <span class="upload">이미지 첨부</span>
                                <img id="img-preview" src="" alt="미리보기" style="display:none;width:100%;height:100%;object-fit:cover;">
                            </label>
                            <input type="file" id="image" name="image" accept="image/*" />
                        </div>
                        <script>
                            const imageInput=document.getElementById('image');
                            const imgPreview=document.getElementById('img-preview');
                            const imageContainer=document.querySelector('.image');
                            imageInput.addEventListener('change',function(event){
                            const file=event.target.files[0];
                            if(file){
                            const objectURL=URL.createObjectURL(file);
                            imgPreview.setAttribute('src',objectURL);
                            imgPreview.style.display='block';
                            imageContainer.classList.add('has-image');
                            imgPreview.onoload=()=>{
                            URL.revokeObjectURL(objectURL);
                            };
                            } else{
                            imgPreview.setAttribute('src','');
                            imgPreview.style.display='none';
                            imageContainer.classList.remove('has-image');
                            }
                            });
                        </script>
                        <div class="text">
                            <textarea id="text" name="text" placeholder="내용을 입력하세요"></textarea>
                        </div>
                    </div>
                    <p><strong>마감일 선택</strong></p>
                    <div id="cal"></div>
                    <input type="hidden" id="deadline" name="deadline">                    
                    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.js"></script>
                    <script>
                        new AirDatepicker('#cal',{
                        inline:true,
                        minDate:new Date(),
                        dateFormat:'yyyy-mm-dd',
                        onSelect:function(data){
                        document.getElementById('deadline').value=data.formattedDate;
                        console.log("선택된 마감일:",data.formattedDate);
                        },
                        locale:{
                        daysMin:['일','월','화','수','목','금','토'],
                        months:['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']
                        }
                        });
                    </script>
                    <div class="pwd">
                        비밀번호 입력 :
                        <input type="password" name="pwd">
                    </div>
                </div>
                <div class="submit-btn">
                    <input type="submit" value="글 올리기" onclick="alert('작성 완료!'); window.location.href='list.html';">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
