<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mypage-register.css">
    <script>
        function menu() {
            var x = document.getElementById('navbar');
            x.classList.toggle('show-menu');
        }
    </script>
</head>

<body>
    <div class="container">
        <header>
            <div class="head">
                <div class="logo block">
                    Gongmoa
                </div>
                <div class="ham block" onclick="menu()">
                </div>
            </div>
            <div class="menu">
                <a href="list.html" class="menu-item">글 목록</a>
                <a href="post.html" class="menu-item">글쓰기</a>
                <a href="mypage.html" class="menu-item">마이페이지</a>
            </div>
            <div class="navbar" id="navbar">
                <a href="list.html" class="nav-item">글 목록</a>
                <a href="post.html" class="nav-item">글쓰기</a>
                <a href="mypage.html" class="nav-item">마이페이지</a>
            </div>
        </header>
        <div class="blank"></div>
        <div class="register-back">
            <div class="register block">
                회원가입
            </div>
            <div class="type-box">
                <div class="name-box">
                    <input type="text" name="name-box" placeholder="이름">
                </div>
                <div class="date-box">
                    <select name="year" id="year">
                        <option value="">선택</option>
                        <option value="2007">2007</option>
                        <option value="2006">2006</option>
                        <option value="2005">2005</option>
                        <option value="2004">2004</option>
                        <option value="2003">2003</option>
                        <option value="2002">2002</option>
                        <option value="2001">2001</option>
                        <option value="2000">2000</option>
                        <option value="1999">1999</option>
                        <option value="1998">1998</option>
                        <option value="1997">1997</option>
                    </select>
                    <div class="date-text block">년</div>
                    <div class="date-blank"></div>
                    <select name="month" id="month">
                        <option value="">선택</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    <div class="date-text block">월</div>
                    <div class="date-blank"></div>
                    <select name="" id="">
                        <option value="">선택</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                        <option value="22">22</option>
                        <option value="23">23</option>
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31">31</option>
                    </select>
                    <div class="date-text block">일</div>
                </div>
                <div class="school-box">
                    <input type="text" name="school" readonly placeholder="학교">
                </div>
                <div class="school-button">검색</div>
                <div class="major-box">
                    <input type="text" name="major" readonly placeholder="학과">
                </div>
                <div class="email-box">
                    <input type="text" name="name-box" placeholder="학교 이메일">
                </div>
                <div class="email-verify">
                    인증
                </div>
                <div class="name-box">
                    <input type="text" name="id-box" placeholder="아이디">
                </div>
                <div class="name-box">
                    <input type="password" name="password-box" placeholder="비밀번호">
                </div>
            </div>
            <div class="register-go">
                <input type="button" name="register-go" value="다음">
            </div>
        </div>
    </div>
</body>
</html>
