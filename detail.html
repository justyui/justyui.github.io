<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            box-sizing: border-box;
        }

        @media (max-width: 300px) {
            .menu {
                visibility: hidden;
            }
        }

        .block {
            display: inline-block;
        }

        .blank {
            height: 100px;
        }

        header {
            position: fixed;
            width: 100%;
            box-shadow: 3px 3px 10px rgba(150, 150, 150, 0.51);
            left: 0;
            top: 0;
            z-index: 10;
        }

        .head {
            display: flex;
            justify-content: space-between;
            height: 70px;
            line-height: 30px;
            background-color: white;
        }

        .logo {
            margin: 20px 0 0 5%;
            height: 30px;
            width: 100px;
            text-align: center;
            font-size: 20px;
        }

        .ham {
            cursor: pointer;
            margin: 20px 30px 0 0;
            height: 30px;
            width: 30px;
            background-color: rgb(140, 140, 140);
        }

        .menu {
            display: flex;
            justify-content: space-around;
            background-color: white;
            height: 30px;
            line-height: 20px;
        }

        .menu-item {
            display: block;
            width: 100px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }

        .navbar {
            display: none;
            position: fixed;
            right: 20px;
            top: 60px;
        }

            .navbar.show-menu {
                display: inherit;
                position: fixed;
                right: 20px;
                top: 60px;
            }

        .nav-item {
            display: block;
            width: 100px;
            height: 30px;
            text-align: center;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            line-height: 30px;
            background-color: white;
            border-style: solid;
            border-width: 30px;
            border-color: rgb(173, 173, 173);
        }

        .post-box {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            height: 500px;
            overflow-y: auto;
        }

        .title {
            padding: 5px 10px;
            background-color: pink;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
            align-items: center;
            margin: 0px 20px;
        }

        .title button {
            background-color: red;
            color: white;
            font-size: 15px;
            padding: 5px;
            flex-shrink: 0;
            border:none;
            cursor:pointer;
        }

        .post {
            border: 8px solid mistyrose;
            margin-bottom: 20px;
            background-color: white;
            margin: 0px 20px;
            display: flex;
            min-height: 650px;
            flex-wrap: wrap;
        }

        .image {
            width: 100%;
            max-width: 500px;
            height: 650px;
            background-color: gray;
            text-align: center;
            line-height: 650px;
            margin: 7px;
        }

        .post-right {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            width: 100%;
            max-width: 570px;
        }

        .lable {
            width: 100px;
            height: 50px;
            background-color: white;
            color: red;
            font-size: 40px;
            font-weight: bold;
            align-self: flex-end;
            padding: 5px;
        }

        .text {
            margin-top: 10px;
            width: 100%;
            max-width: 570px;
            word-break: break-all;
            padding: 7px;
            box-sizing: border-box;
        }

        .info {
            border: 8px solid lightgrey;
            margin-bottom: 20px;
            background-color: white;
            margin: 10px 20px;
            min-height: 200px;
            padding: 5px;
            box-sizing: border-box;
            word-break: break-all;
        }
        .apply-box{
            text-align:center;
        }
        #applyBtn {
            margin: 10px 20px;
            background-color: red;
            color: white;
            font-size: 40px;
            font-weight: bold;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }
        #applyBtn.active{
            background-color:green;
        }
        .modal{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            display:none;
            justify-content:center;
            align-items:center;
            background-color:rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            border:5px solid indianred;
            padding:10px;
            text-align:center;
        }       
        .btn-box button{
            margin:7px;
            cursor:pointer;
            background-color:mistyrose;
            border:2px solid indianred;
            border-radius:5px;
        }
    </style>

    <script>
        function menu() {
        var x = document.getElementById('navbar');
        x.classList.toggle('show-menu');
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="head">
                <div class="logo block">
                    Gongmoa
                </div>
                <div class="ham block" onclick="menu()">
                </div>
            </div>
            <div class="menu">
                <a href="list.html" class="menu-item">글 목록</a>
                <a href="post.html" class="menu-item">글쓰기</a>
                <a href="mypage.html" class="menu-item">마이페이지</a>
            </div>
            <div class="navbar" id="navbar">
                <a href="list.html" class="nav-item">글 목록</a>
                <a href="post.html" class="nav-item">글쓰기</a>
                <a href="mypage.html" class="nav-item">마이페이지</a>
            </div>
        </header>
        <div class="blank"></div>
        <div class="post-box">
            <div class="title">
                000공모전 함께하실 분 구합니다.
                <button onclick="openModal()">수정하기</button>
            </div>
            <div class="modal" id="modal">
                <div class="modal-content">
                    비밀번호 확인 : 
                    <input type="password" id="pwdInput" />
                    <div class="btn-box">
                        <button onclick="closeModal()">취소</button>
                        <button onclick="verifyPassword()">확인</button>
                    </div>
                </div>
            </div>
            <script>
                const modal=document.getElementById("modal");
                const pwdInput=document.getElementById("pwdInput");
                const correctPwd="1234";
                function openModal(){
                modal.style.display="flex";
                pwdInput.value="";
                pwdInput.focus();}
                function closeModal(){
                modal.style.display="none";}
                function verifyPassword(){
                if(pwdInput.value==correctPwd){
                closeModal();
                window.location.href="edit.html";}
                else{
                alert("비밀번호가 틀렸습니다");
                pwdInput.value="";
                pwdInput.focus();}
                }
            </script>
            <div class="post">
                <div class="image">이미지 영역</div>
                <div class="post-right">
                    <div class="lable">D-19</div>
                    <p class="text">본문 내용</p>
                </div>
            </div>
            <div class="info">게시자 정보</div>
            <div class="apply-box">
                <button id="applyBtn" onclick="changeState()">신청하기</button>
                <script>
                    function changeState(){
                    const btn=document.getElementById('applyBtn');
                    btn.classList.toggle('active');
                    if(btn.classList.contains('active')){
                    btn.textContent='신청완료';}
                    else{
                    btn.textContent='신청하기';}
                    }
                </script>

            </div>
        </div>
    </div>
</body>
</html>
